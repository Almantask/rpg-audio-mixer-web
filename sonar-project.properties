# SonarCloud keys — must match the project in the SonarCloud UI if different.
# Conventional defaults from GitHub repo Almantask/rpg-audio-mixer-web:
#   organization: almantask
#   projectKey:    Almantask_rpg-audio-mixer-web
# Override in CI via SonarSource action args if your SonarCloud keys differ.
sonar.organization=almantask
sonar.projectKey=Almantask_rpg-audio-mixer-web
sonar.projectName=rpg-audio-mixer-web

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/**,**/*.d.ts
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/test/**,**/*.d.ts

sonar.typescript.tsconfigPath=tsconfig.app.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info
